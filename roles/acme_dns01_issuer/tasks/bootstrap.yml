---
- name: Resolve ACME DNS-01 issuer role request state
  ansible.builtin.set_fact:
    acme_dns01_issuer_role_requested: >-
      {{
        ((ansible_run_tags | default(['all']))
        | intersect(['all', 'acme_dns01_issuer', 'cert_manager',
                     'external_tls_certificate', 'apps_external_tls', 's3_external_tls', 'tls'])
        | length) > 0
      }}
  tags: [always]

- name: Validate ACME DNS-01 issuer settings
  ansible.builtin.assert:
    that:
      - acme_dns01_issuer_name | length > 0
      - acme_dns01_issuer_namespace | length > 0
      - acme_dns01_issuer_secret_name | length > 0
      - acme_dns01_issuer_secret_key | length > 0
      - acme_dns01_issuer_cloudflare_api_token | length > 0
      - acme_dns01_issuer_cloudflare_zone_id | length > 0
      - acme_dns01_issuer_server | length > 0
      - acme_dns01_issuer_account_key_secret_name | length > 0
      - acme_dns01_issuer_dns_zones is iterable
      - acme_dns01_issuer_dns_zones is not string
      - acme_dns01_issuer_dns_zones | length > 0
    fail_msg: ACME DNS-01 issuer settings are invalid.
  no_log: true
  when: acme_dns01_issuer_role_requested | bool
  tags: [always, validate]

- name: Check ACME DNS-01 Cloudflare DNS record API access
  ansible.builtin.uri:
    url: >-
      https://api.cloudflare.com/client/v4/zones/{{
      acme_dns01_issuer_cloudflare_zone_id }}/dns_records?per_page=1
    validate_certs: "{{ acme_dns01_issuer_cloudflare_api_validate_certs | bool }}"
    method: GET
    headers:
      Authorization: "Bearer {{ acme_dns01_issuer_cloudflare_api_token }}"
      Content-Type: application/json
    return_content: true
    status_code: 200
  register: acme_dns01_issuer_cloudflare_dns_records_access
  changed_when: false
  failed_when: false
  no_log: true
  when:
    - acme_dns01_issuer_role_requested | bool
    - not ansible_check_mode
  delegate_to: localhost
  become: false
  run_once: true

- name: Validate ACME DNS-01 Cloudflare DNS record API access
  ansible.builtin.assert:
    that:
      - acme_dns01_issuer_cloudflare_dns_records_access.status == 200
      - acme_dns01_issuer_cloudflare_dns_records_access.json.success | default(false) | bool
    fail_msg: >-
      The Cloudflare API token must read and edit DNS records for zone
      {{ acme_dns01_issuer_cloudflare_zone_id }}.
  when:
    - acme_dns01_issuer_role_requested | bool
    - not ansible_check_mode

- name: Ensure ACME DNS-01 secret namespace exists
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: ensure_namespace
  vars:
    dev_infra_deployment_target_namespace: "{{ acme_dns01_issuer_namespace }}"
  when: acme_dns01_issuer_role_requested | bool

- name: Apply ACME DNS-01 Cloudflare token Secret
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: apply_manifest
  vars:
    dev_infra_deployment_apply_definitions:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ acme_dns01_issuer_secret_name }}"
        namespace: "{{ acme_dns01_issuer_namespace }}"
      type: Opaque
      stringData: >-
        {{
          dict([[
            acme_dns01_issuer_secret_key,
            acme_dns01_issuer_cloudflare_api_token
          ]])
        }}
    dev_infra_deployment_apply_server_side: false
    dev_infra_deployment_apply_no_log: true
  no_log: true
  when: acme_dns01_issuer_role_requested | bool

- name: Resolve ACME DNS-01 ClusterIssuer definition
  ansible.builtin.set_fact:
    acme_dns01_issuer_definition: >-
      {{ lookup('ansible.builtin.template', role_path ~ '/templates/clusterissuer.yaml.j2') | from_yaml }}
  when: acme_dns01_issuer_role_requested | bool

- name: Apply ACME DNS-01 ClusterIssuer
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: apply_manifest
  vars:
    dev_infra_deployment_apply_definitions: "{{ acme_dns01_issuer_definition }}"
    dev_infra_deployment_apply_server_side: false
  when: acme_dns01_issuer_role_requested | bool

- name: Wait for ACME DNS-01 ClusterIssuer readiness
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: wait_condition
  vars:
    dev_infra_deployment_wait_api_version: cert-manager.io/v1
    dev_infra_deployment_wait_kind: ClusterIssuer
    dev_infra_deployment_wait_name: "{{ acme_dns01_issuer_name }}"
    dev_infra_deployment_wait_condition_type: Ready
    dev_infra_deployment_wait_timeout_seconds:
      "{{ acme_dns01_issuer_wait_timeout | regex_replace('s$', '') | int }}"
  when: acme_dns01_issuer_role_requested | bool
