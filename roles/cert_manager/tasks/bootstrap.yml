---
- name: Validate cert-manager settings
  ansible.builtin.assert:
    that:
      - cert_manager_namespace | length > 0
      - cert_manager_release_name | length > 0
      - cert_manager_helmchart_namespace | length > 0
      - cert_manager_chart_ref | length > 0
      - cert_manager_chart_repo_url | length > 0
      - cert_manager_chart_version | string | length > 0
      - cert_manager_helmchart_failure_policy in ['abort', 'reinstall']
      - cert_manager_helm_values is mapping
    fail_msg: cert-manager role settings are invalid.
  tags: [always, validate]

- name: Ensure cert-manager namespace exists
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: ensure_namespace
  vars:
    dev_infra_deployment_target_namespace: "{{ cert_manager_namespace }}"

- name: Apply cert-manager HelmChart
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: apply_manifest
  vars:
    dev_infra_deployment_apply_definitions:
      apiVersion: helm.cattle.io/v1
      kind: HelmChart
      metadata:
        name: "{{ cert_manager_release_name }}"
        namespace: "{{ cert_manager_helmchart_namespace }}"
      spec:
        chart: "{{ cert_manager_chart_ref }}"
        repo: "{{ cert_manager_chart_repo_url }}"
        version: "{{ cert_manager_chart_version }}"
        targetNamespace: "{{ cert_manager_namespace }}"
        createNamespace: true
        failurePolicy: "{{ cert_manager_helmchart_failure_policy }}"
        valuesContent: "{{ cert_manager_helm_values | to_nice_yaml }}"
    dev_infra_deployment_apply_server_side: false

- name: Wait for cert-manager rollouts
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: rollout_status
  vars:
    dev_infra_deployment_rollout_namespace: "{{ cert_manager_namespace }}"
    dev_infra_deployment_rollout_resource: "deployment/{{ item }}"
    dev_infra_deployment_rollout_timeout_seconds:
      "{{ cert_manager_wait_timeout | regex_replace('s$', '') | int }}"
  loop:
    - cert-manager
    - cert-manager-cainjector
    - cert-manager-webhook

- name: Mark cert-manager CustomResourceDefinitions as Collection-owned
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: patch_resource
  vars:
    dev_infra_deployment_patch_api_version: apiextensions.k8s.io/v1
    dev_infra_deployment_patch_kind: CustomResourceDefinition
    dev_infra_deployment_patch_name: "{{ item }}"
    dev_infra_deployment_patch_definition:
      metadata:
        labels:
          app.kubernetes.io/managed-by: dev-infra-deployment
          dev-infra.deployment/ownership: exclusive
  loop: "{{ cert_manager_crd_names }}"
  when: not ansible_check_mode
