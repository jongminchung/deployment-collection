---
cert_manager_namespace: cert-manager
cert_manager_release_name: cert-manager
cert_manager_helmchart_namespace: kube-system
cert_manager_chart_ref: cert-manager
cert_manager_chart_repo_url: https://charts.jetstack.io
cert_manager_chart_version: v1.21.0
cert_manager_helmchart_failure_policy: abort
cert_manager_helmchart_manifest_path: /tmp/cert-manager-helmchart.yaml
cert_manager_helm_values:
  crds:
    enabled: true
cert_manager_wait_timeout: 300s
