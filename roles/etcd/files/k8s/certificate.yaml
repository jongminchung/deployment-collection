---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: s3-etcd-peer-tls
  namespace: gabiacloud-s3
  labels:
    pki.jamie.kr/root-tls-ca-managed: "true"
spec:
  secretName: s3-etcd-peer-tls
  commonName: gabiacloud-s3-etcd-peer
  duration: 2160h
  renewBefore: 360h
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  usages:
    - digital signature
    - key encipherment
    - server auth
    - client auth
  dnsNames:
    - localhost
    - gabiacloud-s3-etcd
    - gabiacloud-s3-etcd.gabiacloud-s3
    - gabiacloud-s3-etcd.gabiacloud-s3.svc
    - gabiacloud-s3-etcd.gabiacloud-s3.svc.cluster.local
    - gabiacloud-s3-etcd-headless
    - gabiacloud-s3-etcd-headless.gabiacloud-s3
    - gabiacloud-s3-etcd-headless.gabiacloud-s3.svc
    - gabiacloud-s3-etcd-headless.gabiacloud-s3.svc.cluster.local
    - "*.gabiacloud-s3-etcd-headless.gabiacloud-s3.svc"
    - "*.gabiacloud-s3-etcd-headless.gabiacloud-s3.svc.cluster.local"
  ipAddresses:
    - 127.0.0.1
  issuerRef:
    name: root-tls-ca
    kind: ClusterIssuer
    group: cert-manager.io
