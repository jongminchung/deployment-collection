---
- name: Resolve etcd definitions and Helm values
  ansible.builtin.set_fact:
    dev_infra_deployment_etcd_certificate_definition: >-
      {{ lookup('ansible.builtin.file', role_path ~ '/files/k8s/certificate.yaml')
         | from_yaml_all | reject('equalto', none) | list }}
    dev_infra_deployment_etcd_release_values: >-
      {{
        lookup('ansible.builtin.file', role_path ~ '/files/k8s/values.yaml')
        | from_yaml
        | combine(
            {'persistence': {'storageClass': dev_infra_deployment_storage_class}},
            recursive=true
          )
      }}

- name: Validate etcd storage settings
  ansible.builtin.assert:
    that:
      - dev_infra_deployment_storage_class | length > 0
    fail_msg: etcd requires a non-empty dev_infra_deployment_storage_class.

- name: Ensure application namespace exists
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: ensure_namespace
  vars:
    dev_infra_deployment_target_namespace: "{{ dev_infra_deployment_namespace }}"

- name: Wait for root TLS ClusterIssuer
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: wait_clusterissuer

- name: Delete stale etcd client TLS resources
  kubernetes.core.k8s:
    kubeconfig: "{{ dev_infra_deployment_control_node_kubeconfig_path }}"
    api_version: "{{ item.api_version }}"
    kind: "{{ item.kind }}"
    namespace: "{{ dev_infra_deployment_namespace }}"
    name: "{{ item.name }}"
    state: absent
  loop: "{{ dev_infra_deployment_etcd_stale_tls_resources }}"
  vars:
    ansible_python_interpreter: "{{ dev_infra_deployment_python_interpreter }}"

- name: Apply etcd Certificate manifests
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: apply_manifest
  vars:
    dev_infra_deployment_apply_definitions: "{{ dev_infra_deployment_etcd_certificate_definition }}"
    dev_infra_deployment_apply_server_side: false

- name: Wait for etcd peer Certificate
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: wait_certificate
  vars:
    dev_infra_deployment_certificate_name: "{{ dev_infra_deployment_etcd_peer_certificate_name }}"
    dev_infra_deployment_certificate_timeout_seconds: "{{ dev_infra_deployment_etcd_timeout_seconds }}"

- name: Install or upgrade etcd Helm release
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: helm_release
  vars:
    dev_infra_deployment_helm_release_name: "{{ dev_infra_deployment_etcd_release_name }}"
    dev_infra_deployment_helm_chart_ref: "{{ dev_infra_deployment_etcd_chart_ref }}"
    dev_infra_deployment_helm_chart_version: "{{ dev_infra_deployment_etcd_chart_version }}"
    dev_infra_deployment_helm_namespace: "{{ dev_infra_deployment_namespace }}"
    dev_infra_deployment_helm_release_values: "{{ dev_infra_deployment_etcd_release_values }}"
    dev_infra_deployment_helm_wait: true
    dev_infra_deployment_helm_timeout: "{{ dev_infra_deployment_etcd_timeout }}"

- name: Verify etcd after install
  ansible.builtin.import_tasks: verify.yml
