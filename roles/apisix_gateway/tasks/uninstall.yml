---
- name: Read Gateway API CustomResourceDefinition availability
  kubernetes.core.k8s_info:
    kubeconfig: "{{ dev_infra_deployment_control_node_kubeconfig_path }}"
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: gateways.gateway.networking.k8s.io
  register: apisix_gateway_api_crd_info
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  changed_when: false

- name: Resolve APISIX Gateway API definitions for deletion
  ansible.builtin.set_fact:
    apisix_gateway_delete_definitions:
      - apiVersion: gateway.networking.k8s.io/v1
        kind: Gateway
        metadata:
          name: "{{ apisix_gateway_name }}"
          namespace: "{{ apisix_namespace }}"
      - apiVersion: gateway.networking.k8s.io/v1
        kind: GatewayClass
        metadata:
          name: "{{ apisix_gateway_class_name }}"
  when: apisix_gateway_api_crd_info.resources | length > 0

- name: Delete APISIX Gateway API resources
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: delete_manifest
  vars:
    dev_infra_deployment_delete_definitions: "{{ apisix_gateway_delete_definitions }}"
  when: apisix_gateway_api_crd_info.resources | length > 0

- name: Uninstall APISIX Gateway Helm release
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: helm_uninstall
  vars:
    dev_infra_deployment_helm_release_name: "{{ apisix_release_name }}"
    dev_infra_deployment_helm_namespace: "{{ apisix_namespace }}"

- name: Delete APISIX namespace
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: delete_namespace
  vars:
    dev_infra_deployment_delete_namespace: "{{ apisix_namespace }}"

- name: Delete unused Gateway API and APISIX CustomResourceDefinitions
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: delete_crds
  vars:
    dev_infra_deployment_delete_crd_names:
      "{{ apisix_gateway_chart_crd_names + apisix_gateway_api_crd_names }}"
    dev_infra_deployment_delete_crd_allowed_namespaces:
      - "{{ dev_infra_deployment_namespace | default('gabiacloud-s3') }}"
      - "{{ apisix_namespace }}"
    dev_infra_deployment_delete_crd_allowed_cluster_names:
      - "{{ apisix_gateway_class_name }}"
