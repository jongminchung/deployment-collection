---
- name: Resolve APISIX Gateway role request state
  ansible.builtin.set_fact:
    apisix_gateway_role_requested: >-
      {{
        ((ansible_run_tags | default(['all']))
        | intersect(['all', 'apisix_gateway', 'apisix', 'gateway_api'])
        | length) > 0
      }}
  tags: [always]

- name: Resolve APISIX sensitive settings
  ansible.builtin.set_fact:
    apisix_origin_tls_enabled: >-
      {{ (apisix_origin_tls_cert | length > 0) and (apisix_origin_tls_key | length > 0) }}
    apisix_gateway_https_certificate_refs_resolved: >-
      {{
        (
          apisix_gateway_https_certificate_refs
          if (apisix_gateway_https_certificate_refs | length > 0)
          else ([{'name': apisix_gateway_tls_secret_name}]
                if ((apisix_origin_tls_cert | length > 0) and
                    (apisix_origin_tls_key | length > 0)) else [])
        ) + apisix_gateway_extra_https_certificate_refs
      }}
  no_log: true
  when: apisix_gateway_role_requested | bool

- name: Resolve APISIX HTTPS listeners
  ansible.builtin.set_fact:
    apisix_gateway_https_listeners_resolved: >-
      {{
        apisix_gateway_https_listeners
        if (apisix_gateway_https_listeners | length > 0)
        else (
          [{'name': 'https',
            'certificate_refs': apisix_gateway_https_certificate_refs_resolved}]
          if (apisix_gateway_https_certificate_refs_resolved | length > 0) else []
        )
      }}
  when: apisix_gateway_role_requested | bool

- name: Resolve APISIX Gateway settings
  ansible.builtin.set_fact:
    apisix_gateway_https_listener_certificate_refs: >-
      {{ apisix_gateway_https_listeners_resolved | map(attribute='certificate_refs') | flatten }}
    apisix_gateway_annotations_resolved: >-
      {{
        {
          'external-dns.alpha.kubernetes.io/target': apisix_gateway_external_dns_target,
          'external-dns.kubernetes.io/target': apisix_gateway_external_dns_target
        } | combine(apisix_gateway_annotations)
      }}
    apisix_helm_values_resolved: >-
      {{
        apisix_helm_values
        | combine(
          {
            'apisix': {
              'admin': {
                'credentials': {
                  'admin': apisix_admin_key,
                  'viewer': apisix_viewer_key
                }
              }
            },
            'ingress-controller': {
              'gatewayProxy': {
                'provider': {
                  'controlPlane': {
                    'auth': {'adminKey': {'value': apisix_admin_key}}
                  }
                }
              }
            },
            'etcd': {
              'persistence': {
                'storageClass': dev_infra_deployment_storage_class
              }
            }
          },
          recursive=true
        )
      }}
  no_log: true
  when: apisix_gateway_role_requested | bool

- name: Validate APISIX Gateway settings
  ansible.builtin.assert:
    that:
      - apisix_namespace | length > 0
      - apisix_release_name | length > 0
      - apisix_chart_ref | length > 0
      - apisix_chart_version | string | length > 0
      - apisix_chart_repo_name | length > 0
      - apisix_chart_repo_url | length > 0
      - apisix_gateway_api_install_url | length > 0
      - dev_infra_deployment_storage_class | length > 0
      - apisix_gateway_class_name | length > 0
      - apisix_gateway_name | length > 0
      - apisix_admin_key | length > 0
      - apisix_viewer_key | length > 0
      - apisix_gateway_https_listeners_resolved is iterable
      - apisix_helm_values_resolved is mapping
    fail_msg: APISIX Gateway role settings are invalid.
  no_log: true
  when: apisix_gateway_role_requested | bool
  tags: [always, validate]

- name: Validate APISIX Gateway HTTPS listeners
  ansible.builtin.assert:
    that:
      - item.name | default('') | length > 0
      - item.certificate_refs | default([]) is iterable
      - item.certificate_refs | default([]) is not string
      - item.certificate_refs | default([]) | length > 0
    fail_msg: APISIX Gateway HTTPS listener settings are invalid.
  loop: "{{ apisix_gateway_https_listeners_resolved }}"
  loop_control:
    label: "{{ item.name | default('unnamed') }}"
  when: apisix_gateway_role_requested | bool

- name: Ensure APISIX namespace exists
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: ensure_namespace
  vars:
    dev_infra_deployment_target_namespace: "{{ apisix_namespace }}"
  when: apisix_gateway_role_requested | bool

- name: Apply APISIX origin TLS Secret
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: apply_manifest
  vars:
    dev_infra_deployment_apply_definitions:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ apisix_gateway_tls_secret_name }}"
        namespace: "{{ apisix_namespace }}"
      type: kubernetes.io/tls
      stringData:
        tls.crt: "{{ apisix_origin_tls_cert }}"
        tls.key: "{{ apisix_origin_tls_key }}"
    dev_infra_deployment_apply_server_side: false
    dev_infra_deployment_apply_no_log: true
  no_log: true
  when:
    - apisix_gateway_role_requested | bool
    - apisix_origin_tls_enabled | bool

- name: Apply Gateway API CRDs
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: apply_manifest
  vars:
    dev_infra_deployment_apply_url: "{{ apisix_gateway_api_install_url }}"
    dev_infra_deployment_apply_server_side: true
  when: apisix_gateway_role_requested | bool

- name: Configure APISIX Helm repository
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: helm_repo
  vars:
    dev_infra_deployment_helm_repo_name: "{{ apisix_chart_repo_name }}"
    dev_infra_deployment_helm_repo_url: "{{ apisix_chart_repo_url }}"
  when: apisix_gateway_role_requested | bool

- name: Apply APISIX chart CRDs
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: apply_helm_crds
  vars:
    dev_infra_deployment_helm_crd_chart_ref: "{{ apisix_chart_ref }}"
    dev_infra_deployment_helm_crd_chart_version: "{{ apisix_chart_version }}"
    dev_infra_deployment_helm_crd_name_pattern: ".*\\.apisix\\.apache\\.org$"
  when: apisix_gateway_role_requested | bool

- name: Mark Gateway API and APISIX CustomResourceDefinitions as Collection-owned
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: patch_resource
  vars:
    dev_infra_deployment_patch_api_version: apiextensions.k8s.io/v1
    dev_infra_deployment_patch_kind: CustomResourceDefinition
    dev_infra_deployment_patch_name: "{{ item }}"
    dev_infra_deployment_patch_definition:
      metadata:
        labels:
          app.kubernetes.io/managed-by: dev-infra-deployment
          dev-infra.deployment/ownership: exclusive
  loop: "{{ apisix_gateway_api_crd_names + apisix_gateway_chart_crd_names }}"
  when: apisix_gateway_role_requested | bool

- name: Install or upgrade APISIX Gateway
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: helm_release
  vars:
    dev_infra_deployment_helm_release_name: "{{ apisix_release_name }}"
    dev_infra_deployment_helm_chart_ref: "{{ apisix_chart_ref }}"
    dev_infra_deployment_helm_chart_version: "{{ apisix_chart_version }}"
    dev_infra_deployment_helm_namespace: "{{ apisix_namespace }}"
    dev_infra_deployment_helm_release_values: "{{ apisix_helm_values_resolved }}"
    dev_infra_deployment_helm_skip_crds: true
    dev_infra_deployment_helm_wait: true
    dev_infra_deployment_helm_timeout: "{{ apisix_gateway_wait_timeout }}"
    dev_infra_deployment_helm_no_log: true
  no_log: true
  when: apisix_gateway_role_requested | bool

- name: Validate APISIX HTTPS certificate Secret references
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: assert_resources
  vars:
    dev_infra_deployment_required_resources: >-
      {{
        apisix_gateway_https_listener_certificate_refs
        | map('combine', {'api_version': 'v1', 'kind': 'Secret', 'namespace': apisix_namespace})
        | list
      }}
  when:
    - apisix_gateway_role_requested | bool
    - apisix_gateway_https_listener_certificate_refs | length > 0

- name: Resolve APISIX Gateway API definition
  ansible.builtin.set_fact:
    apisix_gateway_definition: >-
      {{ lookup('ansible.builtin.template', role_path ~ '/templates/gateway-api.yaml.j2')
         | from_yaml_all | reject('equalto', none) | list }}
  when: apisix_gateway_role_requested | bool

- name: Apply APISIX Gateway API resources
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: apply_manifest
  vars:
    dev_infra_deployment_apply_definitions: "{{ apisix_gateway_definition }}"
    dev_infra_deployment_apply_server_side: false
  when: apisix_gateway_role_requested | bool

- name: Wait for APISIX rollouts
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: rollout_status
  vars:
    dev_infra_deployment_rollout_namespace: "{{ apisix_namespace }}"
    dev_infra_deployment_rollout_resource: "deployment/{{ item }}"
    dev_infra_deployment_rollout_timeout_seconds:
      "{{ apisix_gateway_wait_timeout | regex_replace('s$', '') | int }}"
  loop:
    - apisix
    - apisix-ingress-controller
  when: apisix_gateway_role_requested | bool

- name: Wait for APISIX GatewayClass acceptance
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: wait_condition
  vars:
    dev_infra_deployment_wait_api_version: gateway.networking.k8s.io/v1
    dev_infra_deployment_wait_kind: GatewayClass
    dev_infra_deployment_wait_name: "{{ apisix_gateway_class_name }}"
    dev_infra_deployment_wait_condition_type: Accepted
    dev_infra_deployment_wait_timeout_seconds:
      "{{ apisix_gateway_wait_timeout | regex_replace('s$', '') | int }}"
  when: apisix_gateway_role_requested | bool

- name: Wait for APISIX Gateway acceptance and programming
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: wait_condition
  vars:
    dev_infra_deployment_wait_api_version: gateway.networking.k8s.io/v1
    dev_infra_deployment_wait_kind: Gateway
    dev_infra_deployment_wait_namespace: "{{ apisix_namespace }}"
    dev_infra_deployment_wait_name: "{{ apisix_gateway_name }}"
    dev_infra_deployment_wait_condition_type: "{{ item }}"
    dev_infra_deployment_wait_timeout_seconds:
      "{{ apisix_gateway_wait_timeout | regex_replace('s$', '') | int }}"
  loop:
    - Accepted
    - Programmed
  when: apisix_gateway_role_requested | bool
