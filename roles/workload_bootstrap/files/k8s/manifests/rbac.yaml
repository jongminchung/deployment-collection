---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: helm-bootstrap
  namespace: gabiacloud-s3
  labels:
    app.kubernetes.io/name: helm-bootstrap
    app.kubernetes.io/managed-by: taskfile
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: helm-bootstrap
  namespace: gabiacloud-s3
  labels:
    app.kubernetes.io/name: helm-bootstrap
    app.kubernetes.io/managed-by: taskfile
rules:
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
      - create
      - update
      - patch
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
  - apiGroups:
      - ""
    resources:
      - pods/exec
    verbs:
      - create
  - apiGroups:
      - apps
    resources:
      - deployments
      - statefulsets
    verbs:
      - get
      - patch
  - apiGroups:
      - cert-manager.io
    resources:
      - certificates
    verbs:
      - get
      - list
      - watch
      - update
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: helm-bootstrap
  namespace: gabiacloud-s3
  labels:
    app.kubernetes.io/name: helm-bootstrap
    app.kubernetes.io/managed-by: taskfile
subjects:
  - kind: ServiceAccount
    name: helm-bootstrap
    namespace: gabiacloud-s3
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: helm-bootstrap
