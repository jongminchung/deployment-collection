---
apiVersion: batch/v1
kind: Job
metadata:
  name: tls-root-ca-converge-trust
  namespace: gabiacloud-s3
  labels:
    app.kubernetes.io/name: helm-bootstrap
    app.kubernetes.io/component: tls-root-ca-converge
    app.kubernetes.io/managed-by: taskfile
spec:
  activeDeadlineSeconds: 420
  backoffLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: helm-bootstrap
        app.kubernetes.io/component: tls-root-ca-converge
    spec:
      serviceAccountName: helm-bootstrap
      restartPolicy: OnFailure
      containers:
        - name: tls-root-ca-converge
          image: docker.io/alpine/k8s:1.33.13
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -ec
            - |
              apk add --no-cache openssl >/dev/null
              /opt/bootstrap/bin/tls-root-ca-converge.sh trust
          env:
            - name: GABIACLOUD_S3_NAMESPACE
              value: gabiacloud-s3
            - name: VAULT_ADDR
              value: http://vault.vault.svc.cluster.local:8200
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: bootstrap-bin
              mountPath: /opt/bootstrap/bin
              readOnly: true
      volumes:
        - name: bootstrap-bin
          configMap:
            name: bootstrap-bin
            defaultMode: 0555
