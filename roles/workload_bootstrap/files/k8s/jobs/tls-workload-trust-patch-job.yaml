---
apiVersion: batch/v1
kind: Job
metadata:
  name: tls-workload-trust-patch
  namespace: gabiacloud-s3
  labels:
    app.kubernetes.io/name: helm-bootstrap
    app.kubernetes.io/component: tls-workload-trust-patch
    app.kubernetes.io/managed-by: taskfile
spec:
  activeDeadlineSeconds: 300
  backoffLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: helm-bootstrap
        app.kubernetes.io/component: tls-workload-trust-patch
    spec:
      serviceAccountName: helm-bootstrap
      restartPolicy: OnFailure
      containers:
        - name: tls-workload-trust-patch
          image: docker.io/alpine/k8s:1.33.13
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -ec
            - /opt/bootstrap/bin/tls-workload-trust-patch.sh all
          env:
            - name: GABIACLOUD_S3_NAMESPACE
              value: gabiacloud-s3
            - name: HOME
              value: /tmp
            - name: XDG_CACHE_HOME
              value: /tmp
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: bootstrap-bin
              mountPath: /opt/bootstrap/bin
              readOnly: true
      volumes:
        - name: bootstrap-bin
          configMap:
            name: bootstrap-bin
            defaultMode: 0555
