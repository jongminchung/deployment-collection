---
- name: Stage workload bootstrap artifacts
  ansible.builtin.import_tasks: stage.yml

- name: Run trust bundle converge Job
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: run_job
  vars:
    dev_infra_deployment_job_name: tls-root-ca-converge-trust
    dev_infra_deployment_job_manifest:
      "{{ dev_infra_deployment_workload_bootstrap_artifacts_root
      }}/jobs/tls-root-ca-converge-trust-job.yaml"
    dev_infra_deployment_job_namespace: "{{ dev_infra_deployment_namespace }}"
    dev_infra_deployment_job_timeout_seconds: 480
