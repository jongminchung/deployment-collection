---
- name: Run trust bundle converge Job
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: run_job
  vars:
    dev_infra_deployment_job_name: tls-root-ca-converge-trust
    dev_infra_deployment_job_definition: "{{ workload_bootstrap_tls_root_ca_converge_trust_job_definition }}"
    dev_infra_deployment_job_namespace: "{{ dev_infra_deployment_namespace }}"
    dev_infra_deployment_job_timeout_seconds: 480
