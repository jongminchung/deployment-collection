---
- name: Resolve Vault Helm values and RBAC definitions
  ansible.builtin.set_fact:
    dev_infra_deployment_vault_values_content: >-
      {{ lookup('ansible.builtin.file', role_path ~ '/files/k8s/values.yaml') }}
    dev_infra_deployment_vault_rbac_definitions: >-
      {{ lookup('ansible.builtin.file', role_path ~ '/files/k8s/manifests/2-rbac.yaml')
         | from_yaml_all | reject('equalto', none) | list }}

- name: Ensure Vault namespace exists
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: ensure_namespace
  vars:
    dev_infra_deployment_target_namespace: "{{ dev_infra_deployment_vault_namespace }}"

- name: Install or upgrade Vault HelmChart
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: apply_manifest
  vars:
    dev_infra_deployment_apply_definitions:
      apiVersion: helm.cattle.io/v1
      kind: HelmChart
      metadata:
        name: "{{ dev_infra_deployment_vault_release_name }}"
        namespace: "{{ dev_infra_deployment_vault_helmchart_namespace }}"
      spec:
        chart: "{{ dev_infra_deployment_vault_chart_ref }}"
        repo: "{{ dev_infra_deployment_vault_repo_url }}"
        version: "{{ dev_infra_deployment_vault_chart_version }}"
        targetNamespace: "{{ dev_infra_deployment_vault_namespace }}"
        createNamespace: true
        failurePolicy: "{{ dev_infra_deployment_vault_helmchart_failure_policy }}"
        timeout: "{{ dev_infra_deployment_vault_timeout }}"
        valuesContent: "{{ dev_infra_deployment_vault_values_content }}"
    dev_infra_deployment_apply_server_side: false

- name: Read Vault initialization and seal state
  ansible.builtin.import_tasks: status.yml

- name: Require manual Vault initialization
  ansible.builtin.fail:
    msg: >-
      Vault was deployed but is not initialized. Run vault operator init in a protected operator
      session, encrypt the generated root token and unseal key with ansible-vault encrypt_string,
      update the inline inventory values, and rerun deployment:kickstart. Do not save plaintext
      credentials in the repository, logs, or shell history.
  when:
    - not ansible_check_mode
    - not (dev_infra_deployment_vault_status.initialized | bool)

- name: Converge initialized Vault seal state
  ansible.builtin.import_tasks: unseal.yml
  when:
    - not ansible_check_mode
    - dev_infra_deployment_vault_status.initialized | bool

- name: Apply Vault auth RBAC
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: apply_manifest
  vars:
    dev_infra_deployment_apply_definitions: "{{ dev_infra_deployment_vault_rbac_definitions }}"
    dev_infra_deployment_apply_server_side: false
