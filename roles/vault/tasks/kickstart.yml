---
- name: Validate inline Vault bootstrap material
  ansible.builtin.assert:
    that:
      - vault_initial_root_token | string | length > 0
      - vault_unseal_key | string | length > 0
    fail_msg: Set vault_initial_root_token and vault_unseal_key as encrypted inline inventory values.
  no_log: true

- name: Read Vault initialization and seal state
  ansible.builtin.import_tasks: status.yml

- name: Require manual Vault initialization
  ansible.builtin.fail:
    msg: >-
      Vault is not initialized. Run vault operator init in a protected operator session, encrypt
      the generated credentials as inline Ansible Vault values, and rerun deployment:kickstart.
  when:
    - not ansible_check_mode
    - not (dev_infra_deployment_vault_status.initialized | bool)

- name: Converge initialized Vault seal state
  ansible.builtin.import_tasks: unseal.yml
  when:
    - not ansible_check_mode
    - dev_infra_deployment_vault_status.initialized | bool

- name: Verify Vault after kickstart
  ansible.builtin.import_tasks: verify.yml
  when: not ansible_check_mode

- name: Mark Vault bootstrap complete
  ansible.builtin.set_fact:
    dev_infra_deployment_vault_bootstrap_completed: true
  when: not ansible_check_mode
