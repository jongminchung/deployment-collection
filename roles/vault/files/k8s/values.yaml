---
global:
  tlsDisable: true

injector:
  enabled: false

server:
  standalone:
    enabled: true
    config: |
      ui = false

      listener "tcp" {
        address = "[::]:8200"
        cluster_address = "[::]:8201"
        tls_disable = 1
      }

      storage "file" {
        path = "/vault/data"
      }

  ha:
    enabled: false

  dev:
    enabled: false

  serviceAccount:
    create: true
    name: vault

  dataStorage:
    enabled: true
    size: 5Gi
    accessMode: ReadWriteOnce

  auditStorage:
    enabled: false

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

ui:
  enabled: false
