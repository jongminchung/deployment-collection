---
- name: Stage OpenSearch artifacts
  ansible.builtin.import_tasks: stage.yml

- name: Delete OpenSearch local manifests
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: delete_manifest
  vars:
    dev_infra_deployment_delete_path: "{{ dev_infra_deployment_opensearch_local_manifests }}"

- name: Check APISIX BackendTrafficPolicy CRD before stale OpenSearch backend cleanup
  kubernetes.core.k8s_info:
    kubeconfig: "{{ dev_infra_deployment_kubeconfig }}"
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: backendtrafficpolicies.apisix.apache.org
  register: dev_infra_deployment_apisix_backend_policy_crd
  vars:
    ansible_python_interpreter: "{{ dev_infra_deployment_python_interpreter }}"

- name: Delete stale OpenSearch local resources
  kubernetes.core.k8s:
    kubeconfig: "{{ dev_infra_deployment_kubeconfig }}"
    api_version: "{{ item.api_version }}"
    kind: "{{ item.kind }}"
    namespace: "{{ dev_infra_deployment_namespace }}"
    name: "{{ item.name }}"
    state: absent
  loop: "{{ dev_infra_deployment_opensearch_stale_local_resources }}"
  when:
    - item.kind != 'BackendTrafficPolicy' or
      dev_infra_deployment_apisix_backend_policy_crd.resources | length > 0
  vars:
    ansible_python_interpreter: "{{ dev_infra_deployment_python_interpreter }}"

- name: Delete OpenSearch Jobs
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: delete_labelled
  vars:
    dev_infra_deployment_delete_kind: Job
    dev_infra_deployment_delete_namespace: "{{ dev_infra_deployment_namespace }}"
    dev_infra_deployment_delete_label_selectors:
      - "app.kubernetes.io/name={{ dev_infra_deployment_opensearch_release_name }}"

- name: Uninstall OpenSearch Helm release
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: helm_uninstall
  vars:
    dev_infra_deployment_helm_release_name: "{{ dev_infra_deployment_opensearch_release_name }}"
    dev_infra_deployment_helm_namespace: "{{ dev_infra_deployment_namespace }}"

- name: Delete OpenSearch Pods before persistent data deletion
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: delete_labelled
  vars:
    dev_infra_deployment_delete_kind: Pod
    dev_infra_deployment_delete_namespace: "{{ dev_infra_deployment_namespace }}"
    dev_infra_deployment_delete_label_selectors:
      - "{{ dev_infra_deployment_opensearch_pod_selector }}"
    dev_infra_deployment_delete_options:
      gracePeriodSeconds: 0
    dev_infra_deployment_delete_wait_sleep: "{{ dev_infra_deployment_pod_wait_sleep_seconds }}"

- name: Delete OpenSearch Certificates
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: delete_manifest
  vars:
    dev_infra_deployment_delete_path: "{{ dev_infra_deployment_opensearch_certificate_manifest }}"

- name: Delete stale OpenSearch HTTP/admin TLS resources
  kubernetes.core.k8s:
    kubeconfig: "{{ dev_infra_deployment_kubeconfig }}"
    api_version: "{{ item.api_version }}"
    kind: "{{ item.kind }}"
    namespace: "{{ dev_infra_deployment_namespace }}"
    name: "{{ item.name }}"
    state: absent
  loop: "{{ dev_infra_deployment_opensearch_stale_tls_resources }}"
  vars:
    ansible_python_interpreter: "{{ dev_infra_deployment_python_interpreter }}"

- name: Delete OpenSearch PVCs
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: delete_labelled
  vars:
    dev_infra_deployment_delete_kind: PersistentVolumeClaim
    dev_infra_deployment_delete_namespace: "{{ dev_infra_deployment_namespace }}"
    dev_infra_deployment_delete_label_selectors:
      - "{{ dev_infra_deployment_opensearch_pod_selector }}"
