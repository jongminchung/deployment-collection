---
- name: Validate inline OpenSearch credentials
  ansible.builtin.assert:
    that:
      - opensearch_admin_password | string | length > 0
      - opensearch_admin_password_hash | string | length > 0
      - opensearch_kibanaserver_password | string | length > 0
      - opensearch_kibanaserver_password_hash | string | length > 0
      - opensearch_metric_consumer_password | string | length > 0
      - opensearch_metric_consumer_password_hash | string | length > 0
      - opensearch_fluentbit_password | string | length > 0
      - opensearch_fluentbit_password_hash | string | length > 0
  no_log: true

- name: Stage OpenSearch artifacts
  ansible.builtin.import_tasks: stage.yml

- name: Wait for root TLS ClusterIssuer before OpenSearch
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: wait_clusterissuer

- name: Delete stale OpenSearch HTTP/admin TLS resources
  kubernetes.core.k8s:
    kubeconfig: "{{ dev_infra_deployment_kubeconfig }}"
    api_version: "{{ item.api_version }}"
    kind: "{{ item.kind }}"
    namespace: "{{ dev_infra_deployment_namespace }}"
    name: "{{ item.name }}"
    state: absent
  loop: "{{ dev_infra_deployment_opensearch_stale_tls_resources }}"
  vars:
    ansible_python_interpreter: "{{ dev_infra_deployment_python_interpreter }}"

- name: Apply OpenSearch Certificate manifests
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: apply_manifest
  vars:
    dev_infra_deployment_apply_path: "{{ dev_infra_deployment_opensearch_certificate_manifest }}"
    dev_infra_deployment_apply_server_side: false

- name: Configure OpenSearch Helm repository
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: helm_repo
  vars:
    dev_infra_deployment_helm_repo_name: "{{ dev_infra_deployment_opensearch_repo_name }}"
    dev_infra_deployment_helm_repo_url: "{{ dev_infra_deployment_opensearch_repo_url }}"

- name: Wait for OpenSearch transport Certificate
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: wait_certificate
  vars:
    dev_infra_deployment_certificate_name: "{{ dev_infra_deployment_opensearch_transport_certificate_name }}"
    dev_infra_deployment_certificate_timeout_seconds: "{{ dev_infra_deployment_opensearch_timeout_seconds }}"

- name: Install or upgrade OpenSearch Helm release
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: helm_release
  vars:
    dev_infra_deployment_helm_release_name: "{{ dev_infra_deployment_opensearch_release_name }}"
    dev_infra_deployment_helm_chart_ref: "{{ dev_infra_deployment_opensearch_chart_ref }}"
    dev_infra_deployment_helm_chart_version: "{{ dev_infra_deployment_opensearch_chart_version }}"
    dev_infra_deployment_helm_namespace: "{{ dev_infra_deployment_namespace }}"
    dev_infra_deployment_helm_values_files: "{{ dev_infra_deployment_opensearch_values_files }}"
    dev_infra_deployment_helm_wait: true
    dev_infra_deployment_helm_timeout: "{{ dev_infra_deployment_opensearch_timeout }}"

- name: Check APISIX CRD before stale OpenSearch route cleanup
  kubernetes.core.k8s_info:
    kubeconfig: "{{ dev_infra_deployment_kubeconfig }}"
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: apisixroutes.apisix.apache.org
  register: dev_infra_deployment_apisix_route_crd
  vars:
    ansible_python_interpreter: "{{ dev_infra_deployment_python_interpreter }}"

- name: Delete stale OpenSearch APISIX CRD routes
  kubernetes.core.k8s:
    kubeconfig: "{{ dev_infra_deployment_kubeconfig }}"
    api_version: "{{ item.api_version }}"
    kind: "{{ item.kind }}"
    namespace: "{{ dev_infra_deployment_namespace }}"
    name: "{{ item.name }}"
    state: absent
  loop:
    - api_version: apisix.apache.org/v2
      kind: ApisixRoute
      name: opensearch
    - api_version: apisix.apache.org/v2
      kind: ApisixUpstream
      name: opensearch
    - api_version: apisix.apache.org/v2
      kind: ApisixTls
      name: opensearch
  when: dev_infra_deployment_apisix_route_crd.resources | length > 0
  vars:
    ansible_python_interpreter: "{{ dev_infra_deployment_python_interpreter }}"

- name: Check APISIX BackendTrafficPolicy CRD before stale OpenSearch backend cleanup
  kubernetes.core.k8s_info:
    kubeconfig: "{{ dev_infra_deployment_kubeconfig }}"
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: backendtrafficpolicies.apisix.apache.org
  register: dev_infra_deployment_apisix_backend_policy_crd
  vars:
    ansible_python_interpreter: "{{ dev_infra_deployment_python_interpreter }}"

- name: Delete stale OpenSearch local resources
  kubernetes.core.k8s:
    kubeconfig: "{{ dev_infra_deployment_kubeconfig }}"
    api_version: "{{ item.api_version }}"
    kind: "{{ item.kind }}"
    namespace: "{{ dev_infra_deployment_namespace }}"
    name: "{{ item.name }}"
    state: absent
  loop: "{{ dev_infra_deployment_opensearch_stale_local_resources }}"
  when:
    - item.kind != 'BackendTrafficPolicy' or
      dev_infra_deployment_apisix_backend_policy_crd.resources | length > 0
  vars:
    ansible_python_interpreter: "{{ dev_infra_deployment_python_interpreter }}"

- name: Apply OpenSearch local manifests
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: apply_manifest
  vars:
    dev_infra_deployment_apply_path: "{{ dev_infra_deployment_opensearch_local_manifests }}"
    dev_infra_deployment_apply_server_side: true
    dev_infra_deployment_apply_field_manager: "{{ dev_infra_deployment_opensearch_field_manager }}"
