---
- name: Ensure dev-infra deployment artifact root exists
  ansible.builtin.file:
    path: "{{ dev_infra_deployment_artifacts_root }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  check_mode: false

- name: Remove stale staged OpenSearch artifacts
  ansible.builtin.file:
    path: "{{ dev_infra_deployment_opensearch_artifacts_root }}"
    state: absent
  check_mode: false

- name: Stage OpenSearch artifacts
  ansible.builtin.copy:
    src: k8s/
    dest: "{{ dev_infra_deployment_opensearch_artifacts_root }}/"
    owner: root
    group: root
    mode: preserve
  check_mode: false

- name: Render OpenSearch secret values
  ansible.builtin.template:
    src: security-secrets.yaml.j2
    dest: "{{ dev_infra_deployment_opensearch_artifacts_root }}/values/security-secrets.yaml"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  check_mode: false
