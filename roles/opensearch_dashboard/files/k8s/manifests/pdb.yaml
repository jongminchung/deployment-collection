apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: opensearch-dashboard
  namespace: gabiacloud-s3
  labels:
    app.kubernetes.io/name: opensearch-dashboard
    app.kubernetes.io/instance: opensearch-dashboard
    app.kubernetes.io/component: dashboard
    app.kubernetes.io/managed-by: taskfile
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opensearch-dashboard
      app.kubernetes.io/instance: opensearch-dashboard
