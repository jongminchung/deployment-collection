---
- name: Ensure dev-infra deployment artifact root exists
  ansible.builtin.file:
    path: "{{ dev_infra_deployment_artifacts_root }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  check_mode: false

- name: Remove stale staged Dashboard artifacts
  ansible.builtin.file:
    path: "{{ dev_infra_deployment_dashboard_artifacts_root }}"
    state: absent
  check_mode: false

- name: Stage Dashboard artifacts
  ansible.builtin.copy:
    src: k8s/
    dest: "{{ dev_infra_deployment_dashboard_artifacts_root }}/"
    owner: root
    group: root
    mode: preserve
  check_mode: false

- name: Render Dashboard secret values
  ansible.builtin.template:
    src: values-secret.yaml.j2
    dest: "{{ dev_infra_deployment_dashboard_artifacts_root }}/values-secret.yaml"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  check_mode: false
