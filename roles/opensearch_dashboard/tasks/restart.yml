---
- name: Restart Dashboard Deployment
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: rollout_restart
  vars:
    dev_infra_deployment_restart_kind: Deployment
    dev_infra_deployment_restart_namespace: "{{ dev_infra_deployment_namespace }}"
    dev_infra_deployment_restart_name: "{{ dev_infra_deployment_dashboard_deployment_name }}"

- name: Verify Dashboard after restart
  ansible.builtin.import_tasks: verify.yml
