---
- name: Install dev-infra deployment CLI prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - python3-venv
    state: present
    update_cache: true
  check_mode: false

- name: Install dev-infra deployment Kubernetes module Python dependencies
  ansible.builtin.pip:
    name: "{{ dev_infra_deployment_python_packages }}"
    virtualenv: "{{ dev_infra_deployment_python_venv }}"
    virtualenv_command: /usr/bin/python3 -m venv
  check_mode: false

- name: Check Kubernetes API access
  kubernetes.core.k8s_info:
    kubeconfig: "{{ dev_infra_deployment_kubeconfig }}"
    api_version: v1
    kind: Namespace
    name: default
  vars:
    ansible_python_interpreter: "{{ dev_infra_deployment_python_interpreter }}"
  changed_when: false
  check_mode: false

- name: Check Helm binary
  ansible.builtin.stat:
    path: "{{ dev_infra_deployment_helm_bin }}"
  register: dev_infra_deployment_helm_binary

- name: Download Helm installer
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
    dest: /tmp/get-helm-3.sh
    owner: root
    group: root
    mode: "0755"
  when: not dev_infra_deployment_helm_binary.stat.exists

- name: Install Helm
  ansible.builtin.command:
    argv:
      - /bin/bash
      - /tmp/get-helm-3.sh
  when: not dev_infra_deployment_helm_binary.stat.exists
  check_mode: false
