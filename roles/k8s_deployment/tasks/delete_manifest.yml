- name: Inspect Kubernetes manifest path {{ dev_infra_deployment_delete_path }}
  ansible.builtin.stat:
    path: "{{ dev_infra_deployment_delete_path }}"
  register: dev_infra_deployment_delete_path_stat

- name: Find Kubernetes manifest files under {{ dev_infra_deployment_delete_path }}
  ansible.builtin.find:
    paths: "{{ dev_infra_deployment_delete_path }}"
    file_type: file
    patterns:
      - "*.yaml"
      - "*.yml"
  register: dev_infra_deployment_delete_manifest_find
  when: dev_infra_deployment_delete_path_stat.stat.isdir | default(false)

- name: Resolve Kubernetes manifest files to delete
  ansible.builtin.set_fact:
    dev_infra_deployment_delete_manifest_files:
      "{{ ([dev_infra_deployment_delete_path] if (dev_infra_deployment_delete_path_stat.stat.isreg |
      default(false)) else (dev_infra_deployment_delete_manifest_find.files | default([]) |
      map(attribute='path') | sort | list)) }}"

- name: Delete Kubernetes manifest {{ dev_infra_deployment_delete_path }}
  kubernetes.core.k8s:
    kubeconfig: "{{ dev_infra_deployment_kubeconfig }}"
    state: absent
    src: "{{ item }}"
    wait: "{{ dev_infra_deployment_delete_wait | default(true) | bool }}"
    wait_timeout:
      "{{ dev_infra_deployment_delete_wait_timeout | default(dev_infra_deployment_wait_timeout_seconds) }}"
  loop: "{{ dev_infra_deployment_delete_manifest_files }}"
  vars:
    ansible_python_interpreter: "{{ dev_infra_deployment_python_interpreter }}"
