---
version: "3"

vars:
  COLLECTION_FQCN: dev_infra.deployment
  COLLECTION_VERSION: "0.0.1"
  COLLECTIONS_PATH: .ansible/collections
  RELEASE_REMOTE: origin
  RELEASE_TAG: "0.0.1"

tasks:
  build:
    desc: Build and install the local dev_infra.deployment Collection.
    cmds:
      - |
        set -eu

        collection_version="$(awk -F': ' '$1 == "version" {gsub(/"/, "", $2); print $2}' galaxy.yml)"
        if [ "$collection_version" != "{{.COLLECTION_VERSION}}" ]; then
          echo "galaxy.yml version must be {{.COLLECTION_VERSION}}, found: $collection_version" >&2
          exit 1
        fi

        ansible-galaxy collection build --force --output-path .build
        ansible-galaxy collection install \
          --force \
          -p {{.COLLECTIONS_PATH}} \
          ".build/dev_infra-deployment-{{.COLLECTION_VERSION}}.tar.gz"

  check:
    desc: Build, verify, and syntax-check the public Collection lifecycle.
    cmds:
      - task: build
      - |
        set -eu

        test ! -e playbooks/install.yml
        test ! -e playbooks/bootstrap.yml
        test ! -d playbooks/migrations
        test ! -d roles/ldap
        test ! -e roles/workload_bootstrap/tasks/bootstrap.yml
        test ! -e roles/internal_pki_issuer/tasks/verify.yml
        test ! -e roles/k8s_deployment/tasks/prerequisites.yml
        test -f roles/k8s_deployment/tasks/validate_control_node.yml
        test -f roles/k8s_deployment/tasks/apply_manifest.yml
        test -f roles/k8s_deployment/tasks/wait_condition.yml
        test -f roles/k8s_deployment/tasks/delete_namespace.yml
        test -f roles/k8s_deployment/tasks/delete_crds.yml
        test -f roles/k8s_deployment/tasks/wait_storage_reclaim.yml

        if rg -n 'dev_infra_deployment_confirm_full_uninstall' roles playbooks README.md; then
          echo "Public uninstall must not require a separate confirmation variable." >&2
          exit 1
        fi

        for role in local_path_provisioner cert_manager acme_dns01_issuer \
          external_tls_certificate apisix_gateway external_dns reloader vault \
          internal_pki_issuer workload_bootstrap etcd opensearch opensearch_dashboard; do
          test -f "roles/$role/tasks/uninstall.yml"
        done
        for role in local_path_provisioner cert_manager apisix_gateway external_dns \
          reloader vault etcd opensearch opensearch_dashboard; do
          test -f "roles/$role/tasks/restart.yml"
        done

        if find roles -path '*/tasks/stage.yml' -print -quit | grep -q .; then
          echo "Remote artifact staging tasks are not allowed." >&2
          exit 1
        fi
        if rg -n \
          'k8s_kubectl_bin|/var/lib/rancher/rke2/bin/kubectl|/usr/local/bin/helm|ansible\.builtin\.(apt|pip):' \
          roles/local_path_provisioner \
          roles/cert_manager \
          roles/acme_dns01_issuer \
          roles/external_tls_certificate \
          roles/external_dns \
          roles/apisix_gateway; then
          echo "Platform roles must use k8s_deployment control-node helpers." >&2
          exit 1
        fi
        if rg -n \
          'dev_infra_deployment_(python_venv|python_packages|staging_root|artifacts_root|kubectl_bin)' \
          roles playbooks; then
          echo "Managed-node deployment tooling variables are not allowed." >&2
          exit 1
        fi
        if rg -n '^[[:space:]]*"\{\{[^"}]+\}\}":[[:space:]]' roles playbooks; then
          echo "Jinja expressions in YAML mapping keys are not rendered; build a computed mapping instead." >&2
          exit 1
        fi
        if rg -n '^[[:space:]]*update_repo_cache:[[:space:]]*true' \
          roles/k8s_deployment/tasks/helm_repo.yml; then
          echo "Helm repository helpers must not refresh unrelated control-node repositories." >&2
          exit 1
        fi
        if rg -n 'dev_infra_deployment_wait_timeout' \
          roles/internal_pki_issuer/defaults/main.yml; then
          echo "Internal PKI timeout defaults must not alias helper variables passed back at include boundaries." >&2
          exit 1
        fi
        if rg -n 'import_tasks: kickstart.yml' roles/vault/tasks/configure.yml; then
          echo "Vault configure must not invoke kickstart." >&2
          exit 1
        fi
        if rg -n 'import_tasks: bootstrap\.yml' roles/workload_bootstrap/tasks/configure.yml; then
          echo "Workload configure must own apply and trust without a pass-through bootstrap." >&2
          exit 1
        fi
        if rg -n 'role_path' \
          roles/workload_bootstrap/tasks/configure.yml \
          roles/workload_bootstrap/tasks/trust.yml; then
          echo "Workload Job definitions must be materialized before crossing helper role boundaries." >&2
          exit 1
        fi
        test -f roles/workload_bootstrap/tasks/resolve_jobs.yml
        for task_file in apply resolve_jobs trust; do
          occurrence_count="$(rg -c "import_tasks: ${task_file}\\.yml" \
            roles/workload_bootstrap/tasks/configure.yml || true)"
          if [ "$occurrence_count" -ne 1 ]; then
            echo "Workload configure must invoke $task_file exactly once." >&2
            exit 1
          fi
        done
        if rg -n 'ansible\.builtin\.import_playbook:' \
          playbooks/init.yml \
          playbooks/configure.yml \
          playbooks/kickstart.yml \
          playbooks/pull.yml \
          playbooks/restart.yml \
          playbooks/uninstall.yml; then
          echo "Public Collection lifecycle Modules must not invoke one another." >&2
          exit 1
        fi
        if rg -n 'import_playbook: .*configure|internal_pki_issuer' playbooks/kickstart.yml; then
          echo "Kickstart must not invoke configure-owned convergence." >&2
          exit 1
        fi
        for role_task in \
          roles/reloader/tasks/bootstrap.yml \
          roles/reloader/tasks/restart.yml \
          roles/workload_bootstrap/tasks/configure.yml; do
          if ! rg -n 'import_tasks: verify\.yml' "$role_task"; then
            echo "$role_task must reuse its verification implementation." >&2
            exit 1
          fi
        done

        ansible-galaxy collection verify \
          {{.COLLECTION_FQCN}} \
          -p {{.COLLECTIONS_PATH}} \
          --offline

        for playbook in init configure kickstart pull restart uninstall; do
          test -f "playbooks/$playbook.yml"
          ANSIBLE_COLLECTIONS_PATH={{.COLLECTIONS_PATH}} \
            ansible-playbook \
              -i tests/inventory/hosts.yml \
              --syntax-check \
              "{{.COLLECTION_FQCN}}.$playbook"
        done

  release:status:
    desc: Show the main and 0.0.1 local and remote commit SHAs.
    cmds:
      - |
        set -eu

        git fetch {{.RELEASE_REMOTE}} \
          refs/heads/main:refs/remotes/{{.RELEASE_REMOTE}}/main

        head_sha="$(git rev-parse HEAD)"
        origin_main_sha="$(git rev-parse {{.RELEASE_REMOTE}}/main)"
        local_tag_sha="$(git rev-parse '{{.RELEASE_TAG}}^{commit}' 2>/dev/null || true)"
        remote_refs="$(git ls-remote --tags {{.RELEASE_REMOTE}} \
          refs/tags/{{.RELEASE_TAG}} 'refs/tags/{{.RELEASE_TAG}}^{}')"
        remote_tag_sha="$(printf '%s\n' "$remote_refs" | \
          awk '$2 == "refs/tags/{{.RELEASE_TAG}}^{}" {print $1}')"
        if [ -z "$remote_tag_sha" ]; then
          remote_tag_sha="$(printf '%s\n' "$remote_refs" | \
            awk '$2 == "refs/tags/{{.RELEASE_TAG}}" {print $1}')"
        fi

        printf 'HEAD:            %s\n' "$head_sha"
        printf '{{.RELEASE_REMOTE}}/main:     %s\n' "$origin_main_sha"
        printf 'local {{.RELEASE_TAG}}:     %s\n' "${local_tag_sha:-<missing>}"
        printf 'remote {{.RELEASE_TAG}}:    %s\n' "${remote_tag_sha:-<missing>}"

  release:retag:
    desc: Validate main and safely move the mutable 0.0.1 tag to HEAD.
    prompt: Move the remote 0.0.1 tag to the verified main HEAD?
    cmds:
      - |
        set -eu

        if [ "$(git branch --show-current)" != "main" ]; then
          echo "release:retag must run on main." >&2
          exit 1
        fi
        if [ -n "$(git status --porcelain)" ]; then
          echo "release:retag requires a clean worktree." >&2
          exit 1
        fi

        git fetch {{.RELEASE_REMOTE}} \
          refs/heads/main:refs/remotes/{{.RELEASE_REMOTE}}/main
        if [ "$(git rev-parse HEAD)" != "$(git rev-parse {{.RELEASE_REMOTE}}/main)" ]; then
          echo "HEAD must match {{.RELEASE_REMOTE}}/main before release." >&2
          exit 1
        fi
      - task: check
      - |
        set -eu

        git fetch {{.RELEASE_REMOTE}} \
          refs/heads/main:refs/remotes/{{.RELEASE_REMOTE}}/main
        head_sha="$(git rev-parse HEAD)"
        if [ "$head_sha" != "$(git rev-parse {{.RELEASE_REMOTE}}/main)" ]; then
          echo "{{.RELEASE_REMOTE}}/main changed during validation; rerun release:retag." >&2
          exit 1
        fi
        if [ -n "$(git status --porcelain)" ]; then
          echo "Worktree changed during validation; rerun release:retag." >&2
          exit 1
        fi

        remote_ref_sha="$(git ls-remote --tags {{.RELEASE_REMOTE}} \
          refs/tags/{{.RELEASE_TAG}} | awk '$2 == "refs/tags/{{.RELEASE_TAG}}" {print $1}')"
        old_local_tag_sha="$(git rev-parse '{{.RELEASE_TAG}}^{commit}' 2>/dev/null || true)"

        git tag -f {{.RELEASE_TAG}} "$head_sha"
        if [ -n "$remote_ref_sha" ]; then
          if ! git push \
            "--force-with-lease=refs/tags/{{.RELEASE_TAG}}:$remote_ref_sha" \
            {{.RELEASE_REMOTE}} \
            refs/tags/{{.RELEASE_TAG}}:refs/tags/{{.RELEASE_TAG}}; then
            if [ -n "$old_local_tag_sha" ]; then
              git tag -f {{.RELEASE_TAG}} "$old_local_tag_sha"
            else
              git tag -d {{.RELEASE_TAG}}
            fi
            exit 1
          fi
        else
          git push {{.RELEASE_REMOTE}} \
            refs/tags/{{.RELEASE_TAG}}:refs/tags/{{.RELEASE_TAG}}
        fi

        remote_refs="$(git ls-remote --tags {{.RELEASE_REMOTE}} \
          refs/tags/{{.RELEASE_TAG}} 'refs/tags/{{.RELEASE_TAG}}^{}')"
        remote_tag_sha="$(printf '%s\n' "$remote_refs" | \
          awk '$2 == "refs/tags/{{.RELEASE_TAG}}^{}" {print $1}')"
        if [ -z "$remote_tag_sha" ]; then
          remote_tag_sha="$(printf '%s\n' "$remote_refs" | \
            awk '$2 == "refs/tags/{{.RELEASE_TAG}}" {print $1}')"
        fi
        if [ "$remote_tag_sha" != "$head_sha" ]; then
          echo "Remote {{.RELEASE_TAG}} does not match the released HEAD." >&2
          exit 1
        fi

        echo "Released {{.RELEASE_TAG}} at $head_sha"
