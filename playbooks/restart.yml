---
- name: Restart Kubernetes platform and application workloads
  hosts: k8s_workload_mgr
  become: false
  gather_facts: false
  pre_tasks:
    - name: Prepare Kubernetes deployment prerequisites
      ansible.builtin.import_role:
        name: dev_infra.deployment.k8s_deployment
        tasks_from: validate_control_node
      tags: [always]
  tasks:
    - name: Restart Kubernetes platform and application workloads from the Ansible control node
      block:
        - name: Restart NFS CSI driver
          ansible.builtin.import_role:
            name: dev_infra.deployment.csi_driver_nfs
            tasks_from: restart
          tags: [csi_driver_nfs, storage]

        - name: Restart cert-manager
          ansible.builtin.import_role:
            name: dev_infra.deployment.cert_manager
            tasks_from: restart
          tags: [cert_manager, tls]

        - name: Restart APISIX Gateway
          ansible.builtin.import_role:
            name: dev_infra.deployment.apisix_gateway
            tasks_from: restart
          tags: [apisix_gateway, gateway_api]

        - name: Restart ExternalDNS
          ansible.builtin.import_role:
            name: dev_infra.deployment.external_dns
            tasks_from: restart
          tags: [external_dns, dns]

        - name: Restart Reloader
          ansible.builtin.import_role:
            name: dev_infra.deployment.reloader
            tasks_from: restart
          tags: [reloader]

        - name: Restart Vault
          ansible.builtin.import_role:
            name: dev_infra.deployment.vault
            tasks_from: restart
          tags: [vault]

        - name: Restart etcd
          ansible.builtin.import_role:
            name: dev_infra.deployment.etcd
            tasks_from: restart
          tags: [etcd]

        - name: Restart OpenSearch
          ansible.builtin.import_role:
            name: dev_infra.deployment.opensearch
            tasks_from: restart
          tags: [opensearch]

        - name: Restart OpenSearch Dashboard
          ansible.builtin.import_role:
            name: dev_infra.deployment.opensearch_dashboard
            tasks_from: restart
          tags: [opensearch_dashboard, dashboard]
      delegate_to: localhost
      become: false
      run_once: true
