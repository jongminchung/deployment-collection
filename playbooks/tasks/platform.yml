---
- name: Converge Kubernetes platform from the Ansible control node
  block:
    - name: Bootstrap NFS CSI storage
      ansible.builtin.import_role:
        name: dev_infra.deployment.csi_driver_nfs
        tasks_from: bootstrap
      tags: [csi_driver_nfs, storage]

    - name: Bootstrap cert-manager
      ansible.builtin.import_role:
        name: dev_infra.deployment.cert_manager
        tasks_from: bootstrap
      tags: [cert_manager, tls]

    - name: Bootstrap ACME DNS-01 issuer
      ansible.builtin.import_role:
        name: dev_infra.deployment.acme_dns01_issuer
        tasks_from: bootstrap
      tags: [acme_dns01_issuer, tls]

    - name: Bootstrap external TLS certificates
      ansible.builtin.include_role:
        name: dev_infra.deployment.external_tls_certificate
        tasks_from: bootstrap
        apply:
          delegate_to: localhost
          become: false
      vars:
        external_tls_certificate_label: "{{ external_tls_certificate_item.label }}"
        external_tls_certificate_request_tags: "{{ external_tls_certificate_item.tags }}"
        external_tls_certificate_namespace: "{{ external_tls_certificate_item.namespace }}"
        external_tls_certificate_name: "{{ external_tls_certificate_item.name }}"
        external_tls_certificate_secret_name: "{{ external_tls_certificate_item.secret_name }}"
        external_tls_certificate_issuer_name: "{{ external_tls_certificate_item.issuer_name }}"
        external_tls_certificate_dns_records: "{{ external_tls_certificate_item.dns_records }}"
        external_tls_certificate_dns_names: "{{ external_tls_certificate_item.dns_names }}"
      loop: "{{ deployment_external_tls_certificates }}"
      loop_control:
        label: "{{ external_tls_certificate_item.name }}"
        loop_var: external_tls_certificate_item
      tags: [external_tls_certificate, tls]

    - name: Bootstrap APISIX Gateway
      ansible.builtin.import_role:
        name: dev_infra.deployment.apisix_gateway
        tasks_from: bootstrap
      tags: [apisix_gateway, gateway_api]

    - name: Bootstrap ExternalDNS
      ansible.builtin.import_role:
        name: dev_infra.deployment.external_dns
        tasks_from: bootstrap
      tags: [external_dns, dns]

    - name: Bootstrap Reloader
      ansible.builtin.import_role:
        name: dev_infra.deployment.reloader
        tasks_from: bootstrap
      tags: [reloader]
  delegate_to: localhost
  become: false
  run_once: true
